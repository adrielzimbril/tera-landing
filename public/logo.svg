<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Minimalist, structural logo for Tera -->
  <rect width="100" height="100" fill="transparent" />
  
  <!-- The T Shape -->
  <rect x="15" y="20" width="70" height="10" fill="currentColor" />
  <rect x="45" y="30" width="10" height="50" fill="currentColor" />
  
  <!-- Geometric accents to make it look architectural -->
  <path d="M 15 35 L 25 35 L 25 45 Z" fill="currentColor" opacity="0.5" />
  <path d="M 85 35 L 75 35 L 75 45 Z" fill="currentColor" opacity="0.5" />
</svg>
